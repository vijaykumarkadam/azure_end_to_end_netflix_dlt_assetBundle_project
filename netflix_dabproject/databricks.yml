# This is a Databricks asset bundle definition for netflix_dabproject.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: netflix_dabproject
  uuid: 7c6f2965-2a47-4b78-b57c-8af1eed62dd8

include:
  - resources/*.yml

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    presets:
      name_prefix: dev_${workspace.current_user.short_name}
      source_linked_deployment : false
    workspace:
      host: https://adb-7405617098374055.15.azuredatabricks.net/
  
  prod:
    mode: production
    workspace:
      host: https://adb-7405617098374055.15.azuredatabricks.net/
      # We explicitly deploy to /Workspace/Users/vnathumahale@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/vnathumahale@gmail.com/PROD/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - group_name: admins
        level: CAN_MANAGE
